<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remi - STEM AI Assistant</title>
  <meta name="description" content="Remi — STEM-focused AI assistant">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <img src="/Remi.jpeg" alt="Remi" class="remi-avatar">
        <div class="header-text">
          <h1>Re<span>mi</span></h1>
          <div class="header-subtitle">STEM-Focused AI Assistant</div>
        </div>
      </div>
      <div class="toggle-container">
        <span class="toggle-label">Deep Dig</span>
        <label class="toggle-switch">
          <input type="checkbox" id="deepDigToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome">
        <img src="/Remi.jpeg" alt="Remi" class="remi-welcome-avatar">
        <h2>Re<span>mi</span></h2>
        <div class="subtitle">STEM-Focused AI Assistant</div>
        <div class="divider"></div>
        <p>Hello! I'm Remi, your friendly AI assistant. I love discussing STEM topics and having pleasant conversations. Type a message to get started.</p>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-wrapper">
        <button class="icon-btn" id="micBtn" title="Push to talk">
          <svg viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <button class="icon-btn" id="speakBtn" title="Enable text-to-speech">
          <svg viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
        <textarea
          id="promptInput"
          placeholder="Type a message..."
          rows="1"
          maxlength="500"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
